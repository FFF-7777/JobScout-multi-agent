server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 前端单页路由回退
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 反向代理后端接口
    location /api/ {
        proxy_pass http://server:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 180s;
    }
    location /health {
        proxy_pass http://server:8000;
    }
}
